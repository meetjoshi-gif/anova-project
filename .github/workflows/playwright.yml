name: Run Playwright Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
permissions:
  contents: write

jobs:
  run_tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
   
      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: |
             npm ci
             npx playwright install
 

      - name: Run Playwright tests in headless mode
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" npx playwright test
        env:
          CI: true

      # ✅ Upload HTML Report
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/

      # ✅ Upload Traces, Videos, Screenshots
      - name: Upload Test Results (Trace/Video/Screenshot)
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

      # ✅ Deploy HTML Report (Public)
      - name: Deploy Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
      
      - name: Extract Test Summary
        id: test_summary
        if: always()
        run: |
          node <<EOF
          const fs = require('fs');

          let passed = 0;
          let failed = 0;
          let failedTests = [];

          try {
            const data = JSON.parse(fs.readFileSync('test-results/results.json', 'utf-8'));

            if (data.stats) {
              passed = data.stats.passed || 0;
              failed = data.stats.failed || 0;
            } else {
              function parseSuite(suite) {
                if (suite.specs) {
                  suite.specs.forEach(spec => {
                    spec.tests.forEach(test => {
                      if (test.results) {
                        test.results.forEach(result => {
                          if (result.status === 'passed') passed++;
                          if (result.status === 'failed') {
                            failed++;
                            failedTests.push(spec.title);
                          }
                        });
                      }
                    });
                  });
                }
                if (suite.suites) suite.suites.forEach(parseSuite);
              }
              if (data.suites) data.suites.forEach(parseSuite);
            }

            if (failed > 0 && failedTests.length === 0) {
              function parseFailed(suite) {
                if (suite.specs) {
                  suite.specs.forEach(spec => {
                    spec.tests.forEach(test => {
                      if (test.results) {
                        test.results.forEach(result => {
                          if (result.status === 'failed') {
                            failedTests.push(spec.title);
                          }
                        });
                      }
                    });
                  });
                }
                if (suite.suites) suite.suites.forEach(parseFailed);
              }
              if (data.suites) data.suites.forEach(parseFailed);
            }
          } catch (e) {
            console.log("Error reading results:", e);
            passed = 0;
            failed = 0;
            failedTests = ['Error reading results'];
          }

          fs.writeFileSync('summary.txt', \`
          PASSED=\${passed}
          FAILED=\${failed}
          FAILED_TESTS=\${failedTests.join(', ') || 'None'}
          \`);
          EOF

          cat summary.txt

          source summary.txt

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "failed_tests=$FAILED_TESTS" >> $GITHUB_OUTPUT
      
      # ✅ Email PASS
      - name: Send Email to Client (PASS)
        if: success()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.mailersend.net
          server_port: 2525
          secure: false
          username: MS_H24YF9@test-86org8emz50gew13.mlsender.net
          password: mssp.L66Tltr.z86org8vov0lew13.AhI2UJr
          subject: "✅ Playwright Tests Passed"
          to: meet.joshi@pulsesolutions.net
          from: MS_H24YF9@test-86org8emz50gew13.mlsender.net
          body: |
            ✅ All test cases passed successfully.

            📊 Summary:
            ✔ Passed: ${{ steps.test_summary.outputs.passed }}
            ❌ Failed: ${{ steps.test_summary.outputs.failed }}

            📦 Download Full Report (Trace + Video + Screenshot):
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # ❌ Email FAIL (Detailed)

      - name: Send Email to Developer (FAIL)
        if: failure()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.mailersend.net
          server_port: 2525
          secure: false
          username: MS_H24YF9@test-86org8emz50gew13.mlsender.net
          password: mssp.L66Tltr.z86org8vov0lew13.AhI2UJr
          subject: "❌ Playwright Tests Failed"
          to: meet.joshi@pulsesolutions.net
          cc: ankita.mahadik@pulsesolutions.net
          from: MS_H24YF9@test-86org8emz50gew13.mlsender.net
          body: |
            ❌ Some test cases failed.

            📊 Summary:
            ✔ Passed: ${{ steps.test_summary.outputs.passed }}
            ❌ Failed: ${{ steps.test_summary.outputs.failed }}

            📦 Download Artifacts (Trace / Video / Screenshot):
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            1. Download "test-results" artifact

            2. Extract files

            3. Run: npx playwright show-trace trace.zip



            🎥 Videos & 📸 Screenshots are inside the same artifact.
            3. Run: npx playwright show-trace trace.zip

            