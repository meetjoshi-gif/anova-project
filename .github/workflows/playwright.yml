name: Run Playwright Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
  
permissions:
  contents: read
  pages: write
  id-token: write


jobs:
  run_tests:
    runs-on: ubuntu-latest


    steps: 

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-    


      - name: Install Dependencies
        run: |
          npm ci
          npx playwright install

      - name: Run Playwright tests in headless mode
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" npx playwright test
        env:
          CI: true

      # Upload HTML Report Artifact
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/

      # Upload Traces, Videos, Screenshots
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

      # GitHub Pages Setup
      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      # PASS Email
      - name: Send Email (PASS)
        if: success()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.mailersend.net
          server_port: 2525
          secure: false
          username: MS_H24YF9@test-86org8emz50gew13.mlsender.net
          password: mssp.L66Tltr.z86org8vov0lew13.AhI2UJr
          subject: "✅ Playwright Tests Passed"
          to: meet.joshi@pulsesolutions.net
          cc: ankita.mahadik@pulsesolutions.net
          from: MS_H24YF9@test-86org8emz50gew13.mlsender.net
          body: |
            ✅ All Playwright test cases passed successfully.

            📊 Public Report:
            ${{ steps.deployment.outputs.page_url }}

            📦 GitHub Run:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # FAIL Email
      - name: Send Email (FAIL)
        if: failure()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.mailersend.net
          server_port: 2525
