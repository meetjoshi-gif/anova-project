name: Run Playwright Tests

on:

  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  run_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-


      - name: Install Dependencies
        run: |
             npm ci
             npx playwright install

      - name: Install Netlify CLI
        run: npm install -g netlify-cli       

      - name: Run Playwright tests in headless mode
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" npx playwright test
        env:
          CI: true



      # ✅ Upload HTML Report
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/

      # ✅ Upload Traces, Videos, Screenshots

      - name: Upload Test Results (Trace/Video/Screenshot)
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/



      # ✅ Deploy HTML Report (Public)

      - name: Deploy Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports

      - name: Deploy Report to Netlify
        if: always()
        run: |
          netlify deploy \
          --dir=reports \
          --site=$NETLIFY_SITE_ID \
          --auth=$NETLIFY_AUTH_TOKEN \
          --prod
        env:
          NETLIFY_AUTH_TOKEN: nfp_kpAxsudkNMY3c8qkMbfBQSN2vScqkBLWbe86
          NETLIFY_SITE_ID: 8f3ea6ff-e3d0-41bd-b8e6-2bce67fa4470    
     

