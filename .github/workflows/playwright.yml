name: Run Playwright Tests

on:

  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  run_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-


      - name: Install Dependencies
        run: |
             npm ci
             npx playwright install


      - name: Run Playwright tests in headless mode
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" npx playwright test
        env:
          CI: true



      # ✅ Upload HTML Report
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/

      # ✅ Upload Traces, Videos, Screenshots

      - name: Upload Test Results (Trace/Video/Screenshot)
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/



      # ✅ Deploy HTML Report (Public)

      - name: Deploy Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports

      - name: Extract Test Statistics
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          const path = 'test-results/results.json';
          if (!fs.existsSync(path)) {
            console.error('ERROR: Playwright JSON report not found:', path);
            process.exit(1);
          }
          const report = JSON.parse(fs.readFileSync(path,'utf8'));

          let total = 0, passed = 0, failed = 0, skipped = 0, flaky = 0;

          function processSuite(suite) {
            if (suite.specs) {
              for (const spec of suite.specs) {
                for (const test of spec.tests || []) {
                  total++;
                  const status = test.results?.[0]?.status || test.status;

                  if (status === 'passed') passed++;
                  else if (status === 'failed') failed++;
                  else if (status === 'skipped') skipped++;
                  else if (status === 'flaky') flaky++;
                }
              }
            }

            for (const child of suite.suites || []) {
              processSuite(child);
            }
          }

          for (const suite of report.suites || []) {
            processSuite(suite);
          }

          fs.appendFileSync(process.env.GITHUB_ENV, \`
          TOTAL_TESTS=\${total}
          PASSED_TESTS=\${passed}
          FAILED_TESTS=\${failed}
          SKIPPED_TESTS=\${skipped}
          FLAKY_TESTS=\${flaky}
          \`);
          "
      - name: Print Test Summary
        if: always()
        run: |
          echo "================ Test Summary ================"
          echo "Total Tests : $TOTAL_TESTS"
          echo "Passed      : $PASSED_TESTS"
          echo "Failed      : $FAILED_TESTS"
          echo "Skipped     : $SKIPPED_TESTS"
          echo "Flaky       : $FLAKY_TESTS"
          echo  ""
          echo "## Playwright Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Total Tests: $TOTAL_TESTS" >> $GITHUB_STEP_SUMMARY
          echo "- Passed: $PASSED_TESTS" >> $GITHUB_STEP_SUMMARY
          echo "- Failed: $FAILED_TESTS" >> $GITHUB_STEP_SUMMARY
          echo "- Skipped: $SKIPPED_TESTS" >> $GITHUB_STEP_SUMMARY
          echo "- Flaky: $FLAKY_TESTS" >> $GITHUB_STEP_SUMMARY

